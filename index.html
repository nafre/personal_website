    <!-- Prevent FOUC on theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <!-- JSON-LD: Person schema -->
    <!--
      KEEP IN SYNC with src/data/content.js — these fields are NOT auto-synced:
        name, jobTitle  → site.name, site.role
        email           → site.email
        worksFor.name   → experience[0].company (current employer)
        sameAs URLs     → site.socials.github, site.socials.linkedin
    -->
    <script type="application/ld+json">
